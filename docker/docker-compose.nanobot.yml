# Nanobot worker stack — runs on the Ryzen node.
# Connects to Redis on the M1 Mac over the LAN.
#
# Usage:
#   docker compose -f docker/docker-compose.nanobot.yml up -d --build
#
services:
  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    env_file:
      - ../.env.nanobot
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
